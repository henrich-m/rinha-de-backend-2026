worker_processes 1;

events {
    use epoll;

    worker_connections 10000;

    multi_accept on;
}

http {
  access_log off;
  error_log /dev/null emerg;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  upstream api {
    server api-1:9292;
    server api-2:9292;
    keepalive 500;
  }

  server {
    listen 9999;

    location / {
      proxy_pass         http://api;
      proxy_http_version 1.1;

      proxy_set_header   Connection "";
      proxy_next_upstream error timeout http_502 http_503;

      proxy_read_timeout 10s;
      proxy_connect_timeout 5s;
    }
  }
}
