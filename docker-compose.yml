services:
  search:
    build:
      context: .
      dockerfile: Dockerfile.search
    image: ghcr.io/henrichm/rinha-search:latest
    environment:
      KNN_NPROBE: "32"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9294/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    # deploy:
    #   resources:
    #     limits:
    #       memory: 225MB

  api-1:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ghcr.io/henrichm/rinha-api:latest
    environment:
      SEARCH_URL: http://search:9294
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      search:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9292/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    # deploy:
    #   resources:
    #     limits:
    #       memory: 55MB

  api-2:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ghcr.io/henrichm/rinha-api:latest
    environment:
      SEARCH_URL: http://search:9294
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      search:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9292/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    # deploy:
    #   resources:
    #     limits:
    #       memory: 55MB

  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy

volumes:
  bundle_cache:
