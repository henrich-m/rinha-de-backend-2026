services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: ghcr.io/henrichm/rinha-db:latest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rinha"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 100MB

  pgbouncer:
    image: edoburu/pgbouncer
    volumes:
      - ./config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./config/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 25MB

  api-1:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ghcr.io/henrichm/rinha-api:latest
    environment:
      DATABASE_URL: postgres://postgres:postgres@pgbouncer:5432/rinha
    volumes:
      - sockets-api-1:/sockets
    depends_on:
      - pgbouncer
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9292/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 100MB

  api-2:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ghcr.io/henrichm/rinha-api:latest
    environment:
      DATABASE_URL: postgres://postgres:postgres@pgbouncer:5432/rinha
    volumes:
      - sockets-api-2:/sockets
    depends_on:
      - pgbouncer
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9292/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 100MB

  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets-api-1:/sockets/api-1:ro
      - sockets-api-2:/sockets/api-2:ro
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 25MB

volumes:
  sockets-api-1:
  sockets-api-2:
