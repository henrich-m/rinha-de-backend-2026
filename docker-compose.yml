services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: ghcr.io/henrichm/rinha-db:latest
    environment:
      - PGDATA=/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rinha"]
      interval: 5s
      timeout: 3s
      retries: 10
    # deploy:
    #   resources:
    #     limits:
    #       memory: 125MB
    #       cpus: "0.60"

  api-1:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ghcr.io/henrichm/rinha-api:latest
    environment:
      DATABASE_URL: postgres://postgres@postgres:5432/rinha
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9292/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 110MB
    #       cpus: "0.15"

  api-2:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ghcr.io/henrichm/rinha-api:latest
    environment:
      DATABASE_URL: postgres://postgres@postgres:5432/rinha
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9292/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 110MB
    #       cpus: "0.15"

  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "0.05"
    #       memory: 25MB

volumes:
  bundle_cache:
